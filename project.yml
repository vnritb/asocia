name: Asocia
options:
  bundleIdPrefix: org.itb
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "" # <- pon aquí tu Team ID de Apple Developer
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Asocia:
    type: application
    platform: iOS
    sources:
      - path: Asocia
    resources:
      - path: Asocia/Resources/Assets.xcassets
      - path: Asocia/Resources/Localization
    info:
      path: Asocia/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleDisplayName: Asocia
        NSCameraUsageDescription: "Asocia necesita la cámara para hacerte una fotografía para tu ficha de socio."
        NSCalendarsFullAccessUsageDescription: "Asocia necesita acceso a tu calendario para poder añadirle los eventos de las actividades."
        # No hace falta NSPhotoLibraryUsageDescription: PhotosPicker (PhotosUI)
        # accede a la galería fuera de proceso y no requiere permiso.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.itb.asocia
        PRODUCT_NAME: Asocia
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1" # iPhone únicamente; usa "1,2" para añadir iPad
    dependencies: []

  AsociaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AsociaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.itb.asocia.tests
    dependencies:
      - target: Asocia

  AsociaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AsociaUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.itb.asocia.uitests
    dependencies:
      - target: Asocia

schemes:
  # Cuatro schemes, uno por entorno (ver Asocia/App/AppEnvironment.swift).
  # Todos comparten build/test; solo cambia la variable de entorno
  # ASOCIA_ENVIRONMENT que se pasa al arrancar la app (Run action).
  # "Asocia (Mock)" es el scheme por defecto: sin él, o sin tocar nada,
  # la app también arranca en modo mock (fallback en AppEnvironment.current).

  Asocia (Mock):
    build: &commonBuild
      targets:
        Asocia: all
        AsociaTests: [test]
        AsociaUITests: [test]
    test: &commonTest
      config: Debug
      gatherCoverageData: true
      targets:
        - AsociaTests
        - AsociaUITests
    run:
      config: Debug
      environmentVariables:
        ASOCIA_ENVIRONMENT: mock
    archive:
      config: Release

  Asocia (Local):
    build: *commonBuild
    test: *commonTest
    run:
      config: Debug
      environmentVariables:
        ASOCIA_ENVIRONMENT: local
    archive:
      config: Release

  Asocia (Staging):
    build: *commonBuild
    test: *commonTest
    run:
      config: Debug
      environmentVariables:
        ASOCIA_ENVIRONMENT: staging
    archive:
      config: Release

  Asocia (Production):
    build: *commonBuild
    test: *commonTest
    run:
      config: Release
      environmentVariables:
        ASOCIA_ENVIRONMENT: production
    archive:
      config: Release
