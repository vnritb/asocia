name: Deploy backend to Production

# ---------------------------------------------------------------------------
# PREPARADO PERO INACTIVO A PROPÓSITO — igual que deploy-staging.yml, pero
# apuntando a los servicios de producción. Además usa el "environment"
# de GitHub `production`, donde conviene configurar un revisor obligatorio
# (Settings -> Environments -> production -> Required reviewers) para que
# nadie despliegue a producción sin una aprobación explícita, ni siquiera
# lanzándolo a mano por error.
#
# Pasos antes de activarlo: los mismos 4 que en deploy-staging.yml, pero con
# los Web Services/base de datos de producción y sus propios secretos.
# ---------------------------------------------------------------------------

on:
  workflow_dispatch: {}
  # Este si NO se recomienda dispararlo automáticamente en push; mejor un
  # tag de versión explícito, cuando toque:
  # push:
  #   tags:
  #     - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

