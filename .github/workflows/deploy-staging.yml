name: Deploy backend to Staging

# ---------------------------------------------------------------------------
# PREPARADO PERO INACTIVO A PROPÓSITO. No hay despliegue automático en push:
# solo se puede lanzar a mano desde la pestaña "Actions" de GitHub
# (workflow_dispatch), y aun así no hace nada real todavía — todos los pasos
# de despliegue están comentados más abajo, a la espera de:
#   1) Elegir el proveedor definitivo (ver docs/ARQUITECTURA.md, sección 6 —
#      la recomendación de partida es Render).
#   2) Crear los 4 Web Services + la base de datos en ese proveedor.
#   3) Añadir los secretos correspondientes en GitHub:
#      Settings -> Secrets and variables -> Actions.
#   4) Descomentar los pasos de este archivo y el trigger `push` de abajo.
# ---------------------------------------------------------------------------

on:
  workflow_dispatch: {}
  # Descomenta esto cuando quieras desplegar automáticamente a staging en
  # cada push a main (una vez completados los 4 pasos de arriba):
  # push:
  #   branches: [main]
  #   paths:
  #     - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
