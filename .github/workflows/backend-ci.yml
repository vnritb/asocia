name: Backend CI

# Tipa, compila y hace un smoke test de los microservicios en cada push/PR
# que toque backend/. Usa un Postgres real como servicio de CI para
# comprobar que los esquemas (schema.sql de cada servicio) se aplican sin
# errores, no solo que el código compila.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias (workspaces)
        run: npm install

      - name: Typecheck (los 5 paquetes)
        run: npm run typecheck

      - name: Build (los 5 paquetes)
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck-and-build
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: asocia
          POSTGRES_PASSWORD: asocia
          POSTGRES_DB: asocia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asocia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Crear esquemas (membership/chat/translation)
        run: psql "postgres://asocia:asocia@localhost:5432/asocia" -f scripts/init-schemas.sql
        env:
          PGPASSWORD: asocia

      - name: Build
        run: npm run build

      - name: Arrancar membership-service y comprobar /healthz
        run: |
          DATABASE_URL="postgres://asocia:asocia@localhost:5432/asocia" \
          PORT=4001 \
          node services/membership-service/dist/index.js &
          sleep 3
          curl --fail http://localhost:4001/healthz

      - name: Arrancar chat-service y comprobar /healthz
        run: |
          DATABASE_URL="postgres://asocia:asocia@localhost:5432/asocia" \
          PORT=4002 \
          node services/chat-service/dist/index.js &
          sleep 3
          curl --fail http://localhost:4002/healthz

      - name: Arrancar translation-service y comprobar /healthz
        run: |
          DATABASE_URL="postgres://asocia:asocia@localhost:5432/asocia" \
          PORT=4003 \
          node services/translation-service/dist/index.js &
          sleep 3
          curl --fail http://localhost:4003/healthz
